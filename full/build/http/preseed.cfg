# OffGrid Full — Kali preseed
# Full desktop install with XFCE GUI
# Used with kali-linux-2026.1-installer-amd64.iso

# ── Locale & keyboard ─────────────────────────────────────────────────────────
d-i localechooser/languagelist select en
d-i debian-installer/locale select en_US.UTF-8
d-i debian-installer/language string en
d-i debian-installer/country string US
d-i keyboard-configuration/xkb-keymap select us
d-i keyboard-configuration/layoutcode string us

# ── Network ───────────────────────────────────────────────────────────────────
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string offgrid
d-i netcfg/get_domain string local
d-i netcfg/wireless_wep string
d-i netcfg/confirm_static boolean true

# ── Mirror ────────────────────────────────────────────────────────────────────
d-i mirror/country string manual
d-i mirror/http/hostname string http.kali.org
d-i mirror/http/directory string /kali
d-i mirror/http/proxy string
d-i mirror/suite string kali-rolling
d-i mirror/codename string kali-rolling

# ── Clock ─────────────────────────────────────────────────────────────────────
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

# ── Disk — entire disk, no LVM ────────────────────────────────────────────────
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman-md/confirm boolean true
d-i partman-md/confirm_nooverwrite boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true

# ── User ──────────────────────────────────────────────────────────────────────
d-i passwd/root-login boolean false
d-i passwd/user-fullname string Kali
d-i passwd/username string kali
d-i passwd/user-password password kali
d-i passwd/user-password-again password kali
d-i user-setup/allow-password-weak boolean true
d-i passwd/user-default-groups string sudo audio cdrom dip floppy video plugdev netdev bluetooth scanner

# ── Package selection — full desktop + all tools ──────────────────────────────
# kali-desktop-xfce  = XFCE GUI desktop environment
# kali-linux-default = standard Kali tool collection (Burp, Metasploit, etc)
tasksel tasksel/first multiselect desktop xfce-desktop
d-i pkgsel/include string \
    kali-desktop-xfce \
    kali-linux-default \
    openssh-server \
    sudo \
    curl \
    wget \
    git \
    python3 \
    python3-pip \
    apt-transport-https \
    ca-certificates \
    gnupg

# Allow recommended packages — needed for full desktop experience
d-i pkgsel/install-recommends boolean true

popularity-contest popularity-contest/participate boolean false

# ── SSH ───────────────────────────────────────────────────────────────────────
d-i preseed/late_command string \
    in-target systemctl enable ssh; \
    in-target sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config; \
    in-target sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config; \
    in-target sh -c 'echo "kali ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/kali'; \
    in-target chmod 440 /etc/sudoers.d/kali

# ── Bootloader ────────────────────────────────────────────────────────────────
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

# ── Finish ────────────────────────────────────────────────────────────────────
d-i finish-install/reboot_in_progress note
